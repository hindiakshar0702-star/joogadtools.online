<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoogadTools Blog — Tips, Updates & Tutorials</title>
  <meta name="description" content="Read the latest updates, tool tutorials, and tech insight from the JoogadTools team. Our 100% free client-side platform blog.">
  <meta name="keywords" content="blog, tech blog, joogadtools updates, online tools tutorials">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C63FF'/><text x='50' y='68' font-size='55' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>J</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="canonical" href="https://joogadtools.online/blog.html">

  <style>
    .blog-header {
      text-align: center;
      padding: calc(var(--header-height) + var(--space-4xl)) var(--space-lg) var(--space-2xl);
    }
    .blog-header h1 {
      font-family: var(--font-heading);
      font-size: var(--fs-4xl);
      font-weight: var(--fw-bold);
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-md);
    }
    .blog-header p {
      color: var(--text-secondary);
      font-size: var(--fs-lg);
      max-width: 600px;
      margin: 0 auto;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-xl);
      padding: var(--space-lg) 0 var(--space-4xl);
    }

    .blog-card {
      display: flex;
      flex-direction: column;
      background: var(--surface-glass);
      border: 1px solid var(--surface-glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all var(--transition-base);
      text-decoration: none;
      height: 100%;
    }
    .blog-card:hover {
      transform: translateY(-8px);
      border-color: var(--surface-glass-border-hover);
      box-shadow: var(--shadow-lg);
      background: var(--surface-glass-hover);
    }

    .blog-card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: rgba(0,0,0,0.5);
      border-bottom: 1px solid var(--surface-glass-border);
    }

    .blog-card-content {
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .blog-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-sm);
      color: var(--text-muted);
      font-size: var(--fs-xs);
      font-weight: var(--fw-medium);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .blog-card-title {
      font-family: var(--font-heading);
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
      line-height: 1.3;
      transition: color var(--transition-fast);
    }
    .blog-card:hover .blog-card-title {
      color: var(--accent-primary);
    }

    .blog-card-desc {
      color: var(--text-secondary);
      font-size: var(--fs-sm);
      line-height: 1.6;
      margin-bottom: var(--space-lg);
      flex: 1;
    }

    .blog-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: auto;
    }

    .empty-blog {
      text-align: center;
      padding: var(--space-4xl) 0;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    .empty-blog-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <main role="main">
    
    <div class="blog-header container">
      <h1>JoogadTools Blog</h1>
      <p>Updates, tutorials, offline tech insight, and platform announcements.</p>
    </div>

    <!-- Monetag Top Ad -->
    <div class="ad-slot container" id="ad-top"></div>

    <div class="container">
      <div class="blog-grid stagger-children" id="blog-grid">
        <!-- Blog posts injected via JS -->
      </div>
    </div>

    <!-- Monetag Bottom Ad -->
    <div class="ad-slot container" id="ad-bottom"></div>

  </main>

  <script src="js/blog-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    // Initialize common header and footer
    JoogadTools.renderHeader('');
    JoogadTools.renderFooter('');

    // Render Blog Grid
    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.getElementById('blog-grid');
      
      if (!typeof blogPosts !== 'undefined' && blogPosts && blogPosts.length > 0) {
        blogPosts.forEach(post => {
          const card = document.createElement('a');
          // Important: We assume blog articles get saved in a /blog/ folder!
          card.href = 'blog/' + post.slug + '.html';
          card.className = 'blog-card';
          
          // Format date safely
          const dateObj = new Date(post.date);
          const dateStr = isNaN(dateObj) ? post.date : dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          let tagsHtml = '';
          if(post.tags && post.tags.length > 0) {
            tagsHtml = post.tags.map(tag => `<span class="badge">${tag}</span>`).join('');
          }

          card.innerHTML = `
            <img class="blog-card-img" src="${post.image || 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=600'}" alt="${post.title} cover image" loading="lazy">
            <div class="blog-card-content">
              <div class="blog-meta">
                <span>${dateStr}</span>
                <span>${post.author || 'Team'}</span>
              </div>
              <h2 class="blog-card-title">${post.title}</h2>
              <p class="blog-card-desc">${post.description}</p>
              <div class="blog-tags">${tagsHtml}</div>
            </div>
          `;
          grid.appendChild(card);
        });
      } else {
        grid.innerHTML = `
          <div class="empty-blog glass-card">
            <div class="empty-blog-icon">📭</div>
            <h2>No posts found</h2>
            <p>Wait for awesomeness. We are brewing some highly-secure client-side articles right now!</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
